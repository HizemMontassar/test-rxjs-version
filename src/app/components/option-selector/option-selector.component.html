@let selectedBoxId = selectedBoxId$ | async;
@let options = options$ | async;
@let selectionHistory = selectionHistory$ | async;

@if (selectedBoxId !== null && selectionHistory) {
  <div class="w-full grid grid-cols-4 gap-4">
    @for (option of options; track option.id) {
      <app-option-item [option]="option"></app-option-item>
    }
  </div>
} @else {
  <div class="flex justify-center items-center w-full h-full">
    <p class="text-lg font-semibold">No Box Selected</p>
  </div>
}
